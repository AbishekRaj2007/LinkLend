kind = "web"
previewPath = "/"
title = "SakshamScore"
version = "1.0.0"
id = "artifacts/sakshamscore"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22160

[services.development]
run = "pnpm --filter @workspace/sakshamscore run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sakshamscore", "run", "build" ]
publicDir = "artifacts/sakshamscore/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22160"
BASE_PATH = "/"
